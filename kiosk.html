<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedVibe | Auto-Triage Kiosk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #F3F4F6; font-family: 'Inter', monospace; margin:0; padding:0; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .brutal-border { border: 4px solid #000; }
        .brutal-shadow { box-shadow: 8px 8px 0px 0px #000; }
        .msg { padding: 1rem; border: 3px solid #000; margin-bottom: 1rem; width: 80%; }
        .ai-msg { background-color: #0052FF; color: white; border-radius: 0; box-shadow: 4px 4px 0px 0px #000; align-self: flex-start; }
        .user-msg { background-color: #33FF99; color: black; box-shadow: 4px 4px 0px 0px #000; align-self: flex-end; margin-left: 20%; }
        #chat-window { height: 60vh; overflow-y: auto; display: flex; flex-direction: column; padding: 2rem; background: #fff; }
    </style>
</head>
<body class="bg-yellow-400">
    <div class="brutal-border brutal-shadow bg-white w-11/12 max-w-4xl h-[90vh] flex flex-col">
        <div class="bg-black text-white p-6 border-b-4 border-black">
            <h1 class="text-4xl font-black uppercase tracking-widest">Self-Triage AI</h1>
            <p class="font-mono text-green-400 text-lg">System Active - Speak naturally.</p>
        </div>
        
        <div id="chat-window" class="flex-grow border-b-4 border-black">
            <div class="msg ai-msg font-mono text-xl font-bold">Hello. I am the MedVibe Intake AI. Please state your name, age, and why you are visiting the hospital today.</div>
        </div>

        <div class="p-6 bg-gray-200 flex gap-4">
            <input type="text" id="user-input" class="brutal-border flex-grow p-4 text-2xl font-mono" placeholder="Type your symptoms here..." autocomplete="off">
            <button id="send-btn" class="brutal-border brutal-shadow bg-green-400 p-4 text-2xl font-black uppercase hover:bg-green-300">SEND</button>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        
        let historyLog = [
            { role: "assistant", content: "Hello. I am the MedVibe Intake AI. Please state your name, age, and why you are visiting the hospital today." }
        ];

        function appendMsg(role, text) {
            const div = document.createElement('div');
            div.className = `msg font-mono text-xl font-bold ${role === 'user' ? 'user-msg' : 'ai-msg'}`;
            div.textContent = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        async function processTriage() {
            const logText = historyLog.map(m => `${m.role}: ${m.content}`).join('\n');
            const pData = {
                name: "KIOSK PATIENT",
                age: 30,
                complaint: logText.substring(0, 500),
                department: "Emergency"
            };

            const res = await fetch('/kiosk-triage', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(pData)
            });
            if(res.ok) {
                appendMsg('assistant', "Your triage token has been generated. Please take a seat, the nurses have been notified.");
                setTimeout(() => { location.reload(); }, 5000);
            }
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;
            
            appendMsg('user', text);
            historyLog.push({ role: 'user', content: text });
            input.value = '';
            
            const payload = { mode: 'kiosk', history: historyLog };

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                const aiText = data.response;
                
                if (aiText.includes('[READY]')) {
                    const cleanText = aiText.replace('[READY]', '').trim();
                    appendMsg('assistant', cleanText);
                    historyLog.push({ role: 'assistant', content: cleanText });
                    await processTriage();
                } else {
                    appendMsg('assistant', aiText);
                    historyLog.push({ role: 'assistant', content: aiText });
                }
            } catch (e) {
                appendMsg('assistant', 'SYSTEM ERROR. PLEASE SEE RECEPTION.');
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
